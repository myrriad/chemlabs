<!DOCTYPE HTML>
<html>

<head>
    <title>ChemLabs</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- Header -->
    <header class="main-header container">
        <h1>ChemLabs</h1>
    </header>
    <div class='main-container container'>

        <div id="cwrap">
            <div id="cdiv">
                <canvas id="canvas" class='noselect'>
					
				</canvas>

            </div>
            <div id="huddiv">
                <canvas id="hud" width='20' height='100'></canvas>
            </div>
            <div class="inspector" id="einspector">
                <!-- <div class="example-thing"> </div>-->

            </div>
        </div>
        <div>
            <button class="button" onclick="addDefault()">Add default</button>
            <input class="slide" id="slider" type="range" step="5" value="0" min="0" max="1000" oninput="slider()" list="steplist">
            <button class="button" onclick="graph()">Graph</button>
        </div>
        <br>
        <div>
            <div class="textarea-wrapper">

                <form action="" onsubmit="return false;">
                    <input type='text' name="message" id="cmdbox" placeholder="Enter Chemical Here" rows="1">

                    <input type='submit' class="button" id="cmdbtn" value="Add to World" onclick="onCommandButton()">
                </form>
            </div>

        </div>
        <div class="system-viewer sm-vw">
            <div class="debug-viewer db-vw">
                <p>Last Clicked Object (<code>lastClickedObject</code>)</p>
                <div class="db-vw-paste">

                </div>
            </div>
            <div class="sm-vw-query">
                <span>Major Species in System </span>
                <input name="message" id="sm-vw-id" value="glob" rows="1">

            </div>
            <div class="sm-vw-display">

            </div>
        </div>
        <footer id="footer">
            <ul class="icons">
                <!-- <li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li> -->
                <!-- <li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li> -->
                <li><a href="http://github.com/phlaxyr/chemlabs" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
                <!-- <li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li> -->
            </ul>
            <ul class="copyright">
                <li>&copy; Untitled.</li>
            </ul>
        </footer>
    </div>
    <!-- Scripts -->
    <div class="scripts-div">
        <!-- <script>var exports = {};</script> -->
        <!-- <script src="https://unpkg.com/lodash@4.17.20"></script> -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>

        <!-- <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/all.min.js"></script> -->
        <!--this is the source of the lag-->
        <!-- <script src="data/ptabledata.js"></script> -->
        <script src="libs/matter.min.js"></script>


        <script src="bin/first.js"></script>

        <script type="module" src="bin/dom/inspector.js"></script>


        <script type="module" src="bin/data/ptable.js"></script>

        <script type="module" src="bin/command.js"></script>
        <script type="module" src="bin/tungstenfunction.js"></script>

        <script type="module" src="bin/equations.js"></script>



        <script src="raw/tut.matter.js"></script>

        <script type="module" src="bin/color/color.js"></script>
        <script type="module" src="bin/color/colortest.js"></script>
        <script type="module" src="bin/color/colormodels.js"></script>
        <!--push it to the front because chemicals.ts needs colormodels.js-->

        <!-- <script src="bin/physold.js"></script> -->
        <script type="module" src="bin/phys.js"></script>

        <script type="module" src="bin/substance.js"></script>
        <script type="module" src="bin/chemicals.js"></script>
        <script type="module" src="bin/physvis.js"></script>




        <!-- <script src="bin/command.js"></script> -->

        <script src="bin/dom/load.js"></script>
        <script src="raw/load.js"></script>

    </div>

</body>

</html>
